<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Table</title>
</head>
<body>
    <h1>Orders Table</h1>
    <table border="1">
        <tr>
            <th>Order ID</th>
            <th>Customer Name</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Order Date</th>
        </tr>
        <!-- Example data -->
        <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>Widget A</td>
            <td>5</td>
            <td>2026-03-19</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Smith</td>
            <td>Widget B</td>
            <td>3</td>
            <td>2026-03-19</td>
        </tr>
    </table>
</body>
</html>
